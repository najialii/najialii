<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Naji Khalid — full-stack engineer and startup builder, building the cloud platform the region ships on">
	<style>
		text { font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace; }
		.fi { opacity: 0; animation: fi 0.9s ease-out forwards; }
		.d1 { animation-delay: 0.1s; }
		.d2 { animation-delay: 0.3s; }
		.d3 { animation-delay: 0.5s; }
		.d4 { animation-delay: 0.7s; }
		@keyframes fi { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
		.route { stroke-dasharray: 4 7; animation: flow 2.6s linear infinite; }
		@keyframes flow { to { stroke-dashoffset: -44; } }
		.pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.4s ease-out infinite; }
		.p2 { animation-delay: 0.6s; }
		.p3 { animation-delay: 1.2s; }
		.p4 { animation-delay: 1.8s; }
		@keyframes pulse { 0% { transform: scale(0.4); opacity: 0.9; } 70% { transform: scale(2.4); opacity: 0; } 100% { transform: scale(2.4); opacity: 0; } }
		.tw { animation: tw 3.4s ease-in-out infinite; }
		.tw2 { animation-delay: 1.1s; }
		.tw3 { animation-delay: 2.2s; }
		@keyframes tw { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.65; } }
		@media (prefers-reduced-motion: reduce) {
			* { animation: none !important; }
			.fi { opacity: 1; }
		}
	</style>
	<defs>
		<linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#F5C15C"/>
			<stop offset="0.55" stop-color="#FF7E5F"/>
			<stop offset="1" stop-color="#9D7CFF"/>
		</linearGradient>
		<radialGradient id="glow" cx="0.72" cy="0.42" r="0.6">
			<stop offset="0" stop-color="#9D7CFF" stop-opacity="0.16"/>
			<stop offset="1" stop-color="#9D7CFF" stop-opacity="0"/>
		</radialGradient>
		<filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
			<feGaussianBlur stdDeviation="7"/>
		</filter>
	</defs>

	<rect width="1000" height="300" fill="#0A0E1A"/>
	<rect width="1000" height="300" fill="url(#glow)"/>

	<!-- star field -->
	<g fill="#E8ECF4">
		<circle class="tw" cx="540" cy="40" r="1.2"/>
		<circle class="tw tw2" cx="608" cy="212" r="1"/>
		<circle class="tw tw3" cx="700" cy="60" r="1.4"/>
		<circle class="tw" cx="760" cy="188" r="1"/>
		<circle class="tw tw2" cx="826" cy="46" r="1.2"/>
		<circle class="tw tw3" cx="905" cy="210" r="1.1"/>
		<circle class="tw" cx="948" cy="84" r="1.3"/>
		<circle class="tw tw2" cx="510" cy="150" r="1"/>
		<circle class="tw tw3" cx="654" cy="132" r="0.9"/>
		<circle class="tw" cx="864" cy="256" r="1"/>
		<circle class="tw tw2" cx="972" cy="160" r="0.9"/>
		<circle class="tw tw3" cx="586" cy="286" r="1.1"/>
	</g>

	<!-- text block -->
	<g class="fi d1">
		<text x="70" y="92" font-size="12" letter-spacing="4" fill="#8B93A7">FULL-STACK ENGINEER · STARTUP BUILDER</text>
	</g>
	<g class="fi d2">
		<text x="70" y="146" font-size="46" font-weight="700" letter-spacing="6" fill="#FF7E5F" opacity="0.35" filter="url(#soft)">NAJI KHALID</text>
		<text x="70" y="146" font-size="46" font-weight="700" letter-spacing="6" fill="url(#g1)">NAJI KHALID</text>
	</g>
	<g class="fi d3">
		<text x="70" y="186" font-size="15" fill="#B9C0D4">Building the cloud platform the region</text>
		<text x="70" y="210" font-size="15" fill="#B9C0D4">ships on — from git push to production.</text>
	</g>
	<g class="fi d4">
		<text x="70" y="248" font-size="12" letter-spacing="2" fill="#F5C15C">RUH · CAI · KRT · ADD — from zero to one</text>
	</g>

	<!-- route map: CAI / KRT / ADD feeding the RUH hub -->
	<g class="fi d3">
		<path class="route" d="M600 78 Q740 30 880 128" stroke="url(#g1)" stroke-width="1.5" opacity="0.75"/>
		<path class="route" d="M632 150 Q756 80 880 128" stroke="url(#g1)" stroke-width="1.5" opacity="0.75"/>
		<path class="route" d="M672 240 Q790 210 880 128" stroke="url(#g1)" stroke-width="1.5" opacity="0.75"/>

		<!-- packets in transit -->
		<circle r="3" fill="#FF7E5F">
			<animateMotion dur="3.4s" repeatCount="indefinite" path="M600 78 Q740 30 880 128"/>
		</circle>
		<circle r="3" fill="#F5C15C">
			<animateMotion dur="4.1s" repeatCount="indefinite" path="M632 150 Q756 80 880 128"/>
		</circle>
		<circle r="3" fill="#9D7CFF">
			<animateMotion dur="4.7s" repeatCount="indefinite" path="M672 240 Q790 210 880 128"/>
		</circle>

		<!-- CAI -->
		<circle class="pulse" cx="600" cy="78" r="9" stroke="#FF7E5F" stroke-width="1.5"/>
		<circle cx="600" cy="78" r="3.5" fill="#FF7E5F"/>
		<text x="560" y="70" font-size="10" letter-spacing="2" fill="#8B93A7">CAI</text>
		<!-- KRT -->
		<circle class="pulse p2" cx="632" cy="150" r="9" stroke="#F5C15C" stroke-width="1.5"/>
		<circle cx="632" cy="150" r="3.5" fill="#F5C15C"/>
		<text x="590" y="156" font-size="10" letter-spacing="2" fill="#8B93A7">KRT</text>
		<!-- ADD -->
		<circle class="pulse p3" cx="672" cy="240" r="9" stroke="#9D7CFF" stroke-width="1.5"/>
		<circle cx="672" cy="240" r="3.5" fill="#9D7CFF"/>
		<text x="638" y="262" font-size="10" letter-spacing="2" fill="#8B93A7">ADD</text>
		<!-- RUH hub -->
		<circle cx="880" cy="128" r="12" stroke="#F5C15C" stroke-width="1" opacity="0.4"/>
		<circle class="pulse p4" cx="880" cy="128" r="10" stroke="#F5C15C" stroke-width="1.5"/>
		<circle cx="880" cy="128" r="5" fill="#F5C15C"/>
		<text x="902" y="122" font-size="10" letter-spacing="2" fill="#F5C15C">RUH</text>
	</g>
</svg>
