name: generate snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: najialii
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#F5C15C&color_dots=#161B22,#3D3320,#7A5E2B,#C29A45,#F5C15C
            dist/snake-light.svg?color_snake=#F5C15C
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
